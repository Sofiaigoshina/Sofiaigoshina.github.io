<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>8 Марта</title>

    <!-- Шрифт Great Vibes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Great Vibes', cursive;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: #fce4e4;
        }

        /* Видео с лепестками - сделал ярче */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            object-fit: cover;
            opacity: 0.8; /* Увеличил яркость видео */
        }

        /* Затемнение - убрал почти полностью */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.1); /* Было 0.25, стало 0.1 - почти прозрачно */
            z-index: 1;
        }

        /* Подсказка */
        .tap-hint {
            position: fixed;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 5;
            pointer-events: none;
            animation: pulse 2s infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Контейнер */
        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        /* Карточка - ОЧЕНЬ ПРОЗРАЧНАЯ */
        .card {
            background: rgba(255, 250, 250, 0.4); /* Было 0.85, стало 0.4 - очень прозрачно */
            padding: 2rem 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Заголовок - с прозрачным фоном */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            font-weight: 400;
            color: #000000;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(221, 183, 183, 0.5);
            padding-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5); /* Добавил тень для читаемости */
        }

        /* Контейнер для стиха - прозрачный */
        .poem-container {
            font-family: 'Great Vibes', cursive;
            font-size: 2.4rem;
            line-height: 1.6;
            color: #000000;
            text-align: left;
            height: 350px;
            overflow-y: auto;
            margin: 10px 0;
            padding: 15px 20px;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.15); /* Было 0.3, стало 0.15 - почти прозрачно */
            border-radius: 20px;
            scrollbar-width: thin;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8); /* Тень для текста */
        }

        .poem-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .poem-container::-webkit-scrollbar-track {
            background: rgba(245, 245, 245, 0.3);
            border-radius: 10px;
        }
        
        .poem-container::-webkit-scrollbar-thumb {
            background: #ddb7b7;
            border-radius: 10px;
        }

        /* Мигающий курсор */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 2.4rem;
            background-color: #000000;
            margin-left: 3px;
            animation: blink 0.9s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Подпись - прозрачная */
        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #000000;
            text-align: right;
            margin-top: 10px;
            border-top: 1px solid rgba(204, 178, 178, 0.5);
            padding-top: 10px;
            background: rgba(255, 250, 250, 0.3); /* Было 0.9, стало 0.3 */
            width: 100%;
            flex-shrink: 0;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        /* Адаптация */
        @media (max-width: 768px) {
            .card { 
                padding: 1.5rem; 
                background: rgba(255, 250, 250, 0.35);
            }
            h1 { font-size: 3.5rem; }
            .poem-container { 
                font-size: 2rem; 
                height: 300px;
                background: rgba(255, 255, 255, 0.12);
            }
            .cursor { height: 2rem; }
            .signature { 
                font-size: 2.5rem;
                background: rgba(255, 250, 250, 0.25);
            }
            .tap-hint { font-size: 2rem; padding: 15px 30px; }
        }

        @media (max-width: 480px) {
            .card { 
                padding: 1.2rem;
                background: rgba(255, 250, 250, 0.3);
            }
            h1 { font-size: 2.8rem; }
            .poem-container { 
                font-size: 1.8rem; 
                height: 250px;
                background: rgba(255, 255, 255, 0.1);
            }
            .signature { 
                font-size: 2.2rem;
                background: rgba(255, 250, 250, 0.2);
            }
            .tap-hint { font-size: 1.5rem; padding: 10px 20px; }
        }

        @media (max-width: 360px) {
            .poem-container { height: 200px; }
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay loop muted playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="tap-hint" class="tap-hint">Нажми на экран</div>

    <audio id="background-music" preload="auto" loop>
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card">
            <h1>С 8 Марта, Анна Владимировна!</h1>

            <!-- Стих -->
            <div id="poem-text" class="poem-container"></div>

            <!-- Подпись -->
            <div id="signature-block" class="signature">София</div>
        </div>
    </div>

    <script>
        // СТИХ
        const poemLines = [
            "Анна Владимировна, с праздником весны!",
            "Вы — доктор наук, воплощение красоты.",
            "Доцент, заведующая кафедрой умело,",
            "Ведёте Вы знаний большое дело.",
            "",
            "Кафедра анализа данных и ИИ",
            "Расцветает под руководством Вашим, посмотри!",
            "Студентов учите мыслить, творить,",
            "Науку и знания в них заложить.",
            "",
            "Желаю здоровья, успехов, добра,",
            "Чтоб жизнь, как весна, была щедра.",
            "Оставайтесь такой же красивой всегда,",
            "Пусть радует сердце любая звезда!"
        ];

        const poemElement = document.getElementById('poem-text');
        const music = document.getElementById('background-music');
        const hint = document.getElementById('tap-hint');

        let currentLine = 0;
        let currentChar = 0;
        let displayedText = '';
        let isMusicPlaying = false;
        let poemStarted = false;

        // Функция печати
        function typePoem() {
            if (!poemStarted) return;

            if (currentLine < poemLines.length) {
                const line = poemLines[currentLine];

                if (currentChar < line.length) {
                    displayedText += line[currentChar];
                    currentChar++;

                    let fullText = '';
                    for (let i = 0; i < currentLine; i++) {
                        fullText += poemLines[i] + '\n';
                    }
                    fullText += displayedText;

                    poemElement.innerHTML = fullText + '<span class="cursor"></span>';
                    poemElement.scrollTop = poemElement.scrollHeight;

                    setTimeout(typePoem, 80);
                } else {
                    if (currentLine < poemLines.length - 1) {
                        currentLine++;
                        currentChar = 0;
                        displayedText = '';

                        let fullText = '';
                        for (let i = 0; i <= currentLine; i++) {
                            if (i < currentLine) {
                                fullText += poemLines[i] + '\n';
                            }
                        }
                        poemElement.innerHTML = fullText + '<span class="cursor"></span>';
                        poemElement.scrollTop = poemElement.scrollHeight;

                        setTimeout(typePoem, 400);
                    } else {
                        let fullText = poemLines.join('\n');
                        poemElement.innerHTML = fullText;
                    }
                }
            }
        }

        // Запуск по нажатию
        function startEverything() {
            if (isMusicPlaying) return;

            music.play().catch(e => console.log('Музыка:', e));

            hint.style.opacity = '0';
            setTimeout(() => {
                hint.style.display = 'none';
            }, 500);

            if (!poemStarted) {
                poemStarted = true;
                setTimeout(typePoem, 500);
            }

            isMusicPlaying = true;
        }

        // Слушаем нажатия
        document.body.addEventListener('click', startEverything);
        document.body.addEventListener('touchstart', startEverything);

        // Проверка видео
        window.onload = function() {
            const video = document.querySelector('video');
            video.addEventListener('error', function() {
                document.body.style.background = '#fce4e4';
            });
            music.load();
        };
    </script>

</body>
</html>
