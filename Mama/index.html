<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 Марта, мама!</title>

    <!-- Шрифт Great Vibes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
            background: #fce4e4;
        }

        /* Видео с лепестками - ИСПРАВЛЕНО для телефона */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            object-fit: cover;
            opacity: 0.8; /* Увеличил прозрачность, чтобы лучше было видно */
            pointer-events: none;
        }

        /* Затемнение - сделал прозрачнее */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 240, 245, 0.15); /* Более прозрачное */
            z-index: 1;
            pointer-events: none;
        }

        /* Подсказка */
        .tap-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 20;
            pointer-events: none;
            animation: pulse 2s infinite;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Контейнер - ИСПРАВЛЕНО для телефона */
        .container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            pointer-events: none;
        }

        /* Карточка - ИСПРАВЛЕНО для телефона */
        .card {
            background: rgba(255, 250, 250, 0.9);
            padding: 1.5rem 1.8rem;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 95vw;
            width: 100%;
            max-height: 85vh;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            overflow: hidden;
        }

        /* Заголовок - ИСПРАВЛЕНО */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            font-weight: 400;
            color: #000000;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #ddb7b7;
            padding-bottom: 8px;
            flex-shrink: 0;
            line-height: 1.2;
        }

        /* Контейнер для стиха - ИСПРАВЛЕНО */
        .poem-container {
            font-family: 'Great Vibes', cursive;
            font-size: 1.9rem;
            line-height: 1.4;
            color: #000000;
            text-align: left;
            min-height: 150px;
            max-height: 55vh;
            overflow-y: auto;
            margin: 8px 0;
            padding: 10px 12px;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
            background: rgba(255, 240, 240, 0.2);
            border-radius: 15px;
            scrollbar-width: thin;
            flex: 1;
        }

        /* Стили для скролла */
        .poem-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .poem-container::-webkit-scrollbar-track {
            background: rgba(245, 245, 245, 0.3);
            border-radius: 10px;
        }
        
        .poem-container::-webkit-scrollbar-thumb {
            background: #ddb7b7;
            border-radius: 10px;
        }

        /* Мигающий курсор - ИСПРАВЛЕНО */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.9rem;
            background-color: #000000;
            margin-left: 2px;
            animation: blink 0.9s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Подпись - ИСПРАВЛЕНО */
        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: #000000;
            text-align: right;
            margin-top: 8px;
            border-top: 1px solid #ccb2b2;
            padding-top: 8px;
            flex-shrink: 0;
            line-height: 1.2;
        }

        /* Адаптация для маленьких телефонов */
        @media (max-width: 380px) {
            .card { padding: 1rem 1.2rem; }
            h1 { font-size: 2.5rem; }
            .poem-container { font-size: 1.6rem; line-height: 1.3; }
            .cursor { height: 1.6rem; }
            .signature { font-size: 1.9rem; }
            .tap-hint { font-size: 1.8rem; padding: 12px 24px; }
        }

        /* Для планшетов */
        @media (min-width: 600px) and (max-width: 1024px) {
            h1 { font-size: 3.5rem; }
            .poem-container { font-size: 2.2rem; }
            .signature { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Видео с розовыми лепестками -->
    <video class="video-background" autoplay loop muted playsinline webkit-playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- Подсказка -->
    <div id="tap-hint" class="tap-hint">👆 Нажми на экран</div>

    <!-- Аудио -->
    <audio id="background-music" preload="auto" loop>
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card">
            <h1>С 8 Марта, мамочка</h1>

            <!-- Стих -->
            <div id="poem-text" class="poem-container"></div>

            <!-- Подпись -->
            <div id="signature-block" class="signature"></div>
        </div>
    </div>

    <script>
        // СТИХ
        const poemLines = [
            "Мама, милая, с праздником весны!",
            "Ты — мой свет в ненастные дни.",
            "Пусть улыбка сияет на устах,",
            "Пусть печали все тают в облаках.",
            "",
            "Твои руки хранят тепло и уют,",
            "Твои слова, как маяк, зовут.",
            "Ты — самая лучшая в мире моём,",
            "Пусть счастье входит в каждый дом.",
            "",
            "Здоровья, радости, долгих лет,",
            "Прекрасней тебя в мире нет.",
            "Цвети, как сад весной, всегда,",
            "Пусть не коснутся тебя года."
        ];

        const signature = "Твоя дочь";

        const poemElement = document.getElementById('poem-text');
        const signatureElement = document.getElementById('signature-block');
        const music = document.getElementById('background-music');
        const hint = document.getElementById('tap-hint');
        
        let currentLine = 0;
        let currentChar = 0;
        let displayedText = '';
        let poemStarted = false;
        let isPlaying = false;

        // Функция печати
        function typePoem() {
            if (!poemStarted) return;

            if (currentLine < poemLines.length) {
                const line = poemLines[currentLine];

                if (currentChar < line.length) {
                    displayedText += line[currentChar];
                    currentChar++;

                    // Показываем все строки
                    let fullText = '';
                    for (let i = 0; i < currentLine; i++) {
                        fullText += poemLines[i] + '\n';
                    }
                    fullText += displayedText;

                    poemElement.innerHTML = fullText + '<span class="cursor"></span>';
                    
                    // Прокрутка вниз
                    poemElement.scrollTop = poemElement.scrollHeight;

                    setTimeout(typePoem, 70); // Скорость печати
                } else {
                    // Строка завершена
                    if (currentLine < poemLines.length - 1) {
                        currentLine++;
                        currentChar = 0;
                        displayedText = '';

                        let fullText = '';
                        for (let i = 0; i <= currentLine; i++) {
                            if (i < currentLine) {
                                fullText += poemLines[i] + '\n';
                            }
                        }
                        poemElement.innerHTML = fullText + '<span class="cursor"></span>';
                        
                        setTimeout(typePoem, 350); // Пауза между строками
                    } else {
                        // Стих закончен
                        let fullText = poemLines.join('\n');
                        poemElement.innerHTML = fullText;
                        signatureElement.textContent = signature;
                    }
                }
            }
        }

        // Запуск по нажатию
        function startApp() {
            if (isPlaying) return;
            isPlaying = true;

            // Запускаем музыку
            music.play().catch(e => console.log('Музыка:', e));

            // Прячем подсказку
            hint.style.transition = 'opacity 0.5s';
            hint.style.opacity = '0';
            setTimeout(() => {
                hint.style.display = 'none';
            }, 500);

            // Запускаем печать
            poemStarted = true;
            setTimeout(typePoem, 500);
        }

        // Слушаем нажатия
        document.addEventListener('click', startApp);
        document.addEventListener('touchstart', startApp);

        // Проверка видео
        window.onload = function() {
            const video = document.querySelector('video');
            video.play().catch(e => console.log('Видео:', e));
        };
    </script>

</body>
</html>
